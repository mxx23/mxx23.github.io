<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg/dist/ffmpeg.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: #ffffff24;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        #videoPlayer {
            max-width: 100%;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #compressBtn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #compressBtn:hover {
            background-color: #0056b3;
        }

        /* Custom file input button style */
        #fileInputWrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        #fileInput {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        #chooseFileBtn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #chooseFileBtn:hover {
            background-color: #0056b3;
        }

        .loading-text {
            display: none;
            font-size: 18px;
            color: #007bff;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Custom file input button -->

        <div>
            <video controls id="videoPlayer"></video>
        </div>
        <div id="fileInputWrapper">
            <input type="file" accept="video/*" id="fileInput">
            <button id="chooseFileBtn">选择文件</button>
        </div>
        <div>
            <button id="compressBtn">压缩视频</button>
        </div>
        <div id="loadingText" class="loading-text">压缩中...</div>
        <div id="completeText" class="loading-text">压缩完毕</div>
        <div id="error_info" class="loading-text">发生错误</div>
    </div>
</body>

</html>

<script>
    document.getElementById('fileInput').addEventListener('change', function () {
        const file = this.files[0];
        const videoPlayer = document.getElementById('videoPlayer');

        // Load selected video into video element
        videoPlayer.src = URL.createObjectURL(file);
        videoPlayer.play();
    });

    document.getElementById('compressBtn').addEventListener('click', async function () {
        const file = document.getElementById('fileInput').files[0];
        document.getElementById('error_info').style.display = 'block'; // 隐藏错误信息
        document.getElementById('loadingText').style.display = 'block'; // 显示"压缩中..."字样
        try {
            const videoBlob = await compressVideo(file);
            saveBlob(videoBlob, 'compressed_video.mp4');
            document.getElementById('loadingText').style.display = 'none'; // 隐藏"压缩中..."字样
            document.getElementById('completeText').style.display = 'block'; // 显示"压缩完毕"字样
            setTimeout(function () {
                document.getElementById('completeText').style.display = 'none'; // 5秒后隐藏"压缩完毕"字样
            }, 5000);
        } catch (error) {
            // 捕获错误，并显示在页面上
            document.getElementById('completeText').style.display = 'none'; // 隐藏"压缩完毕"字样
            document.getElementById('loadingText').style.display = 'none'; // 隐藏"压缩中..."字样
            document.getElementById('error_info').innerText = '发生错误: ' + error.message;
            document.getElementById('error_info').style.display = 'block'; // 显示错误信息
        }
    });


    async function compressVideo(file) {
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        await ffmpeg.load();
        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
        await ffmpeg.run('-i', 'input.mp4', '-c:v', 'libx264', '-crf', '28', '-preset', 'veryfast', '-c:a', 'aac', '-b:a', '128k', 'output.mp4');
        const data = ffmpeg.FS('readFile', 'output.mp4');
        return new Blob([data.buffer], { type: 'video/mp4' });
    }

    function saveBlob(blob, fileName) {
        const a = document.createElement('a');
        document.body.appendChild(a);
        a.style.display = 'none';

        const url = window.URL.createObjectURL(blob);
        a.href = url;
        a.download = fileName;
        a.click();

        window.URL.revokeObjectURL(url);
    }
</script>
