<script>
    var rssUrl = window.location.origin + "/atom.xml";
    window.onload = function () {
        // 复制rssUrl到剪切板
        if (rssUrl) {
            navigator.clipboard.writeText(rssUrl);
        }
        alert("RSS链接已复制到剪切板");
        // 返回到前一个页面
        window.history.back();
    }
</script>
